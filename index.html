<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Marketplace Técnico Dámaso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">MTD 🛠️</div>
        <div class="nav-buttons">
            <button id="btnVerCarrito" class="btn-nav">🛒 Carrito (<span id="contador-carrito">0</span>)</button>
            <button id="btnAuth" class="btn-nav btn-primario">Ingresar</button>
            <button id="btnCerrarSesion" class="btn-nav btn-peligro" style="display: none;">Salir</button>
        </div>
    </header>

    <section class="banner">
        <h2>Ecosistema de Economía Circular</h2>
        <p id="info-usuario">Navegando como: <strong>Invitado</strong></p>
    </section>

    <nav class="categorias">
        <button class="btn-filtro activo" data-cat="todos">Todos</button>
        <button class="btn-filtro" data-cat="uniformes">Uniformes</button>
        <button class="btn-filtro" data-cat="herramientas">Herramientas</button>
        <button class="btn-filtro" data-cat="donaciones">Donaciones</button>
    </nav>

    <main class="contenedor-principal">
        <div id="vitrina-productos" class="grid-productos"></div>
    </main>

    <section id="seccion-vendedor" class="panel-vendedor" style="display: none;">
        <h3>Subir Nuevo Artículo</h3>
        <form id="form-producto" class="formulario-movil">
            <input type="text" id="prod-nombre" placeholder="Nombre del artículo" required>
            <select id="prod-categoria" required>
                <option value="">Selecciona Categoría</option>
                <option value="uniformes">Uniformes</option>
                <option value="herramientas">Herramientas</option>
                <option value="donaciones">Donaciones</option>
            </select>
            <input type="number" id="prod-precio" placeholder="Precio (Ej: 15000)" required>
            <input type="url" id="prod-imagen" placeholder="Link de la imagen (URL de Google)" required>
            <button type="submit" class="btn-bloque btn-exito">Publicar Artículo</button>
        </form>
    </section>

    <div id="modal-auth" class="modal">
        <div class="contenido-modal">
            <span class="cerrar-modal" id="cerrar-auth">&times;</span>
            <h3 id="auth-titulo">Iniciar Sesión</h3>
            <form id="form-auth" class="formulario-movil">
                <input type="text" id="auth-usuario" placeholder="Usuario" required>
                <input type="password" id="auth-clave" placeholder="Contraseña" required>
                <button type="submit" id="btn-submit-auth" class="btn-bloque btn-primario">Ingresar</button>
            </form>
            <p class="cambio-modo-auth">¿No tienes cuenta? <span id="enlace-cambio-auth">Regístrate aquí</span></p>
        </div>
    </div>

    <div id="modal-carrito" class="modal">
        <div class="contenido-modal">
            <span class="cerrar-modal" id="cerrar-carrito">&times;</span>
            <h3>Tu Carrito Presupuestal</h3>
            <div id="lista-carrito"></div>
            <div class="total-carrito">
                <p>Total Estimado: <strong>$<span id="total-precio-carrito">0</span></strong></p>
            </div>
            <button id="btn-vaciar-carrito" class="btn-bloque btn-peligro">Vaciar Carrito</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
