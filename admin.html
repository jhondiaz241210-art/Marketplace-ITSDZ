<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - MTD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar" style="background-color: #111;">
        <div class="logo">MTD Admin 🔒</div>
        <button onclick="window.location.href='index.html'" class="btn-nav">Volver a la Tienda</button>
    </header>

    <main class="contenedor-principal">
        <div class="banner">
            <h2>Panel de Control Global</h2>
            <p>Moderación de publicaciones y auditoría de la comunidad</p>
        </div>

        <section class="panel-vendedor" style="margin-top: 20px;">
            <h3>Bitácora de Control: Todos los Productos Activos</h3>
            <div style="overflow-x: auto; margin-top: 15px;">
                <table id="tabla-admin-productos" style="width: 100%; border-collapse: collapse; text-align: left; background: white;">
                    <thead>
                        <tr style="background: #eee; border-bottom: 2px solid #ccc;">
                            <th style="padding: 10px;">Artículo</th>
                            <th style="padding: 10px;">Categoría</th>
                            <th style="padding: 10px;">Precio</th>
                            <th style="padding: 10px;">Vendedor</th>
                            <th style="padding: 10px;">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-tabla-admin"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let sesion = JSON.parse(localStorage.getItem('market_sesion')) || null;
        if (!sesion || sesion.rol !== 'admin') {
            alert("Acceso denegado. Solo administradores.");
            window.location.href = 'index.html';
        }

        let productos = JSON.parse(localStorage.getItem('market_productos')) || [];

        function cargarTablaAdmin() {
            const tbody = document.getElementById('cuerpo-tabla-admin');
            tbody.innerHTML = "";

            if (productos.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="padding:15px; text-align:center; color:#777;">No hay anuncios registrados.</td></tr>`;
                return;
            }

            productos.forEach(p => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = "1px solid #ddd";
                tr.innerHTML = `
                    <td style="padding: 10px; font-weight: bold;">${p.nombre}</td>
                    <td style="padding: 10px; text-transform: capitalize;">${p.categoria}</td>
                    <td style="padding: 10px; color: #0056b3;">$${p.precio.toLocaleString()}</td>
                    <td style="padding: 10px;">${p.propietario}</td>
                    <td style="padding: 10px;"><button class="btn-nav btn-peligro" style="padding: 4px 8px; font-size: 0.8rem;" onclick="purgarProducto(${p.id})">Eliminar</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.purgarProducto = function(id) {
            if (confirm("¿Deseas eliminar este artículo definitivamente del sistema escolar?")) {
                productos = productos.filter(p => p.id !== id);
                localStorage.setItem('market_productos', JSON.stringify(productos));
                let carrito = JSON.parse(localStorage.getItem('market_carrito')) || [];
                carrito = carrito.filter(c => c.id !== id);
                localStorage.setItem('market_carrito', JSON.stringify(carrito));
                cargarTablaAdmin();
            }
        };

        document.addEventListener('DOMContentLoaded', cargarTablaAdmin);
    </script>
</body>
</html>
