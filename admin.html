<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Administrador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="marca-agua"></div>

    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <h1>⚙️ Panel de Control del Administrador</h1>
        <a href="index.html" class="btn-enlace">👁️ Ver Vitrina Pública</a>
    </div>
    <p>Historial de control, auditoría de transacciones y moderación global del colegio.</p>

    <h2>📋 Registro de Auditoría y Control del Sistema</h2>
    <div class="tabla-contenedor">
        <table>
            <thead>
                <tr>
                    <th>Fecha / Estado</th>
                    <th>Usuario / Vendedor</th>
                    <th>Contacto</th>
                    <th>Producto o Acción Realizada</th>
                    <th>Categoría</th>
                    <th>Moderación</th>
                </tr>
            </thead>
            <tbody id="lista-registros">
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
    <script>
        window.addEventListener("load", function() {
            // Verificar de seguridad: si no es admin, lo devuelve
            let usuarioActivo = localStorage.getItem("market_usuario_activo");
            if (usuarioActivo !== "Administrador") {
                alert("Acceso denegado. Solo el Administrador puede ver este panel.");
                window.location.href = "index.html";
            } else {
                registrarActividad("Administrador", "Abrió el panel de control secreto");
                actualizarTablaAdmin();
            }
        });
    </script>
</body>
</html>
